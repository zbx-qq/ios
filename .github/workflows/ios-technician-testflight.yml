name: iOS Technician TestFlight

on:
  workflow_dispatch:

env:
  IOS_PROJECT_DIR: MingZhu-Technician-IOS
  SCHEME: MingZhuTechnician
  BUNDLE_ID: com.taimingzhu.ymz
  TEAM_ID: 4N529765U3
  PROFILE_NAME: MingZhu DaoJia AppStore

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import signing files
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$IOS_P12_BASE64"
          test -n "$IOS_P12_PASSWORD"
          test -n "$IOS_MOBILEPROVISION_BASE64"

          mkdir -p "$RUNNER_TEMP/signing"
          decode_base64() {
            local value="$1"
            local output="$2"
            printf '%s' "$value" | base64 --decode > "$output" 2>/dev/null || printf '%s' "$value" | base64 -D > "$output"
          }
          decode_base64 "$IOS_P12_BASE64" "$RUNNER_TEMP/signing/cert.p12"
          decode_base64 "$IOS_MOBILEPROVISION_BASE64" "$RUNNER_TEMP/signing/profile.mobileprovision"

          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/signing/cert.p12" -k "$KEYCHAIN" -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$RUNNER_TEMP/signing/profile.mobileprovision" > "$RUNNER_TEMP/signing/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/signing/profile.plist")
          cp "$RUNNER_TEMP/signing/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Generate Xcode project
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: xcodegen generate

      - name: Archive
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$SCHEME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/$SCHEME.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"

      - name: Create export options
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/$SCHEME.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist "$PWD/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: mingzhu-technician-ios-ipa
          path: ${{ env.IOS_PROJECT_DIR }}/build/export/*.ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        working-directory: ${{ env.IOS_PROJECT_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID}" ] || [ -z "${APP_STORE_CONNECT_API_ISSUER_ID}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_BASE64}" ]; then
            echo "App Store Connect API secrets are not configured. IPA artifact was built, skipping TestFlight upload."
            exit 0
          fi
          mkdir -p "$HOME/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" 2>/dev/null || printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 -D > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          IPA_PATH="$(find "$PWD/build/export" -name '*.ipa' -print -quit)"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
