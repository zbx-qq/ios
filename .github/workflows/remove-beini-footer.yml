name: Remove Beini footer copyright

on:
  push:
    branches:
      - gh-pages
    paths:
      - '.github/workflows/remove-beini-footer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-footer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove copyright text
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('beini-tech/index.html')
          text = path.read_text(encoding='utf-8')
          old = text
          text = text.replace('      <span>© 2026 贝尼科技 · 用听得懂的方式，把想法做成产品</span>\n', '')
          text = text.replace('© 2026 贝尼科技 Beini Technology. All rights reserved.', '')
          if text == old:
              print('No matching copyright text found.')
          else:
              path.write_text(text, encoding='utf-8')
              print('Copyright text removed.')
          PY

      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beini-tech/index.html
          git commit -m "Remove Beini footer copyright"
          git push origin gh-pages
